<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TakaPlast · Espace Investisseur</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#020617;--surf:#050b1f;--surf2:#091224;--acc:#00B894;--accs:#55efc4;--accd:rgba(0,184,148,.12);--red:#EF4444;--txt:#E5F0FF;--mut:#64748B;--brd:#0f1f35;--mono:'DM Mono',monospace;--sans:'Syne',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--txt);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,184,148,.04)1px,transparent 1px),linear-gradient(90deg,rgba(0,184,148,.04)1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}

/* HEADER */
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:1.4rem 2rem;border-bottom:1px solid var(--brd);background:rgba(2,6,23,.9);backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:.6rem;font-weight:700;font-size:.88rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;color:var(--txt)}
.logo-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--acc)}
.hdr-r{display:flex;align-items:center;gap:1.25rem}
.lsw button{background:none;border:none;color:var(--mut);cursor:pointer;font-size:.82rem;font-family:var(--mono);padding:.15rem .3rem}
.lsw button.on{color:var(--accs);font-weight:600}
.vbadge{display:flex;align-items:center;gap:.5rem;font-family:var(--mono);font-size:.72rem;color:var(--mut)}
.vbadge-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc)}

/* LANG */
[data-fr],[data-en]{display:none}
body.fr [data-fr]{display:block}
body.en [data-en]{display:block}
body.fr span[data-fr],body.en span[data-en]{display:inline}

/* LOCK */
#lock{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 65px);padding:2rem}
.card{width:100%;max-width:400px;background:var(--surf);border:1px solid var(--brd);border-radius:1.25rem;padding:2.5rem 2.25rem;box-shadow:0 0 0 1px rgba(0,184,148,.1),0 40px 80px rgba(0,0,0,.8);animation:up .5s cubic-bezier(.22,1,.36,1)}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.lock-ico{width:56px;height:56px;border-radius:1rem;background:var(--accd);border:1px solid rgba(0,184,148,.3);display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 1.5rem}
.card h1{text-align:center;font-size:1.2rem;margin-bottom:.3rem}
.card p{text-align:center;font-size:.82rem;color:var(--mut);margin-bottom:2rem;line-height:1.5}
.lbl{display:block;font-family:var(--mono);font-size:.7rem;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.4rem}
.inp{width:100%;background:rgba(15,23,42,.9);border:1px solid var(--brd);border-radius:.6rem;color:var(--txt);font-family:var(--mono);font-size:.95rem;padding:.7rem .9rem;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(0,184,148,.15)}
.btn-go{width:100%;margin-top:1rem;padding:.75rem;background:linear-gradient(135deg,var(--acc),#26c6da);color:#022c22;border:none;border-radius:.6rem;font-family:var(--sans);font-size:.9rem;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(0,184,148,.3)}
.btn-go:hover{opacity:.9}
.btn-go:disabled{opacity:.5;cursor:not-allowed}
.err{margin-top:.75rem;padding:.6rem .9rem;border-radius:.5rem;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);font-size:.8rem;text-align:center;display:none}
.back{text-align:center;margin-top:1.4rem;font-size:.8rem;color:var(--mut)}
.back a{color:var(--accs);text-decoration:none}

/* VAULT */
#vault{display:none;position:relative;z-index:10;max-width:980px;margin:0 auto;padding:2.5rem 1.5rem 4rem;animation:up .4s ease}
.vh{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--brd)}
.vtitle{font-size:1.5rem;font-weight:800}
.vtitle span{color:var(--acc)}
.vmeta{font-family:var(--mono);font-size:.72rem;color:var(--mut);margin-top:.3rem;line-height:1.8}
.hactions{display:flex;gap:.75rem;align-items:center}
.zip-btn{display:flex;align-items:center;gap:.5rem;padding:.65rem 1.2rem;background:var(--accd);border:1px solid rgba(0,184,148,.35);border-radius:.6rem;color:var(--accs);font-family:var(--sans);font-size:.85rem;font-weight:600;text-decoration:none;cursor:pointer;transition:background .2s}
.zip-btn:hover{background:rgba(0,184,148,.2)}
.zip-btn.disabled{opacity:.35;pointer-events:none}
.zip-prog{display:none;height:3px;border-radius:999px;background:var(--brd);margin-top:.5rem}
.zip-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--acc),#26c6da);border-radius:999px;transition:width .2s}
.lock-btn{background:none;border:none;font-size:1rem;cursor:pointer;color:var(--mut);opacity:.45;padding:.3rem}
.lock-btn:hover{opacity:.85}

/* FOLDERS */
.folder{margin-bottom:2.5rem}
.fhdr{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem}
.ficon{font-size:1.1rem}
.fname{font-size:.75rem;font-family:var(--mono);font-weight:500;text-transform:uppercase;letter-spacing:.12em;color:var(--mut)}
.fsub{font-family:var(--mono);font-size:.68rem;color:var(--mut);background:var(--surf2);padding:.15rem .45rem;border-radius:999px;border:1px solid var(--brd)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.85rem}

/* CARDS */
.doc-card{background:var(--surf);border:1px solid var(--brd);border-radius:.85rem;padding:1.1rem 1.2rem;display:flex;flex-direction:column;gap:.6rem;transition:border-color .2s,transform .15s}
.doc-card:hover{border-color:rgba(0,184,148,.25);transform:translateY(-2px)}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
.badge{font-family:var(--mono);font-size:.63rem;font-weight:500;padding:.2rem .5rem;border-radius:.3rem;text-transform:uppercase;letter-spacing:.08em}
.tp{background:rgba(249,115,22,.15);color:#fb923c;border:1px solid rgba(249,115,22,.25)}
.pd{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.xl{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
.dx{background:rgba(56,189,248,.15);color:#7dd3fc;border:1px solid rgba(56,189,248,.25)}
.zp{background:rgba(167,139,250,.15);color:#c4b5fd;border:1px solid rgba(167,139,250,.25)}
.ltag{font-family:var(--mono);font-size:.6rem;padding:.12rem .38rem;border-radius:.25rem;border:1px solid var(--brd);color:var(--mut);background:var(--surf2)}
.cname{font-size:.88rem;font-weight:600;color:var(--txt)}
.cdesc{font-size:.78rem;color:var(--mut);line-height:1.5;flex:1}
.cftr{display:flex;justify-content:flex-end;margin-top:.2rem}

/* DOWNLOAD LINK — native <a> */
.dl{display:inline-flex;align-items:center;gap:.35rem;padding:.38rem .8rem;border-radius:.45rem;background:var(--accd);border:1px solid rgba(0,184,148,.3);color:var(--accs);font-family:var(--sans);font-size:.76rem;font-weight:600;text-decoration:none;transition:background .15s}
.dl:hover{background:rgba(0,184,148,.22);border-color:var(--acc)}
.dl.na{opacity:.18;pointer-events:none;background:transparent;border-color:rgba(100,116,139,.15);color:var(--mut)}

hr{border:none;border-top:1px solid var(--brd);margin:2rem 0}
footer{position:relative;z-index:10;max-width:980px;margin:0 auto;padding:1.25rem 1.5rem 2rem;font-family:var(--mono);font-size:.72rem;color:var(--mut);border-top:1px solid var(--brd);display:flex;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
footer a{color:var(--accs);text-decoration:none}
@media(max-width:600px){.grid{grid-template-columns:1fr}header{padding:1rem}}
</style>
</head>

      <button id="bfr" class="on" onclick="setLang('fr')">FR</button>
      <span style="color:var(--brd)">|</span>
      <button id="ben" onclick="setLang('en')">EN</button>
    </div>
    <div class="vbadge">
      <div class="vbadge-dot"></div>
      <span data-fr>Espace Investisseur</span>
      <span data-en>Investor Portal</span>
    </div>
  </div>
</header>

  <div class="card">
    <div class="lock-ico">🔐</div>
    <h1 data-fr>Espace Investisseur</h1>
